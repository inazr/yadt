<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dbt Lineage</title>
    <script src="cytoscape.min.js"></script>
    <script src="elk.bundled.js"></script>
    <script src="cytoscape-elk.js"></script>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --text-color: #ccc;
            --tooltip-bg: #2d2d2d;
            --tooltip-border: #555;
            --tooltip-text: #ddd;
            --tooltip-name: #fff;
            --tooltip-detail: #aaa;
            --btn-bg: #2d2d2d;
            --btn-border: #555;
            --btn-text: #ccc;
            --btn-hover: #3d3d3d;
            --edge-color: #555;
            --loading-color: #888;
            --card-bg: #2a2a2a;
            --card-border: #3a3a3a;
            --card-name: #eee;
            --card-schema: #888;
            --card-icon-bg: #1f1f1f;
            --card-icon-fg: #aaa;
            --card-selected-bg: rgba(33, 150, 243, 0.18);
            --card-selected-border: #2196F3;
            --stub-bg: #252525;
            --stub-border: #444;
            --stub-text: #888;
        }
        body.theme-light {
            --card-bg: #ffffff;
            --card-border: #e0e0e0;
            --card-name: #1f1f1f;
            --card-schema: #888;
            --card-icon-bg: #f3f5f8;
            --card-icon-fg: #666;
            --card-selected-bg: #eaf3ff;
            --card-selected-border: #2196F3;
            --stub-bg: #f3f4f6;
            --stub-border: #d0d3d8;
            --stub-text: #888;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg-color); color: var(--text-color); }
        #cy { width: 100%; height: 100%; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #888; font-size: 14px; }

        .tooltip {
            position: absolute;
            background: var(--tooltip-bg);
            border: 1px solid var(--tooltip-border);
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 12px;
            color: var(--tooltip-text);
            pointer-events: none;
            z-index: 1000;
            max-width: 300px;
            display: none;
            line-height: 1.4;
        }
        .tooltip .tt-name { font-weight: 600; color: var(--tooltip-name); margin-bottom: 4px; }
        .tooltip .tt-detail { color: var(--tooltip-detail); }

        #controls {
            position: absolute;
            top: 8px;
            right: 8px;
            display: flex;
            gap: 4px;
            z-index: 100;
        }
        #controls button {
            width: 28px;
            height: 28px;
            border: 1px solid var(--btn-border);
            border-radius: 4px;
            background: var(--btn-bg);
            color: var(--btn-text);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        #controls button:hover { background: var(--btn-hover); }

        #search-box {
            position: absolute;
            top: 8px;
            left: 8px;
            z-index: 100;
            display: inline-block;
        }
        #search-box input {
            width: 180px;
            height: 28px;
            padding: 0 8px;
            border: 1px solid var(--btn-border);
            border-radius: 4px;
            background: var(--btn-bg);
            color: var(--btn-text);
            font-size: 12px;
            font-family: inherit;
            outline: none;
        }
        #search-box input { padding-right: 24px; }
        #search-box input::placeholder { color: var(--tooltip-detail); }
        #search-box input:focus { border-color: #2196F3; }
        #search-clear {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            border: none;
            background: none;
            color: var(--tooltip-detail);
            font-size: 14px;
            cursor: pointer;
            display: none;
            padding: 0;
            line-height: 16px;
            text-align: center;
        }
        #search-clear:hover { color: var(--btn-text); }
        .help-icon {
            background: transparent;
            border: 1px solid var(--btn-border);
            border-radius: 50%;
            width: 18px;
            height: 18px;
            line-height: 14px;
            padding: 0;
            margin-left: 4px;
            color: var(--btn-text);
            cursor: help;
            font-size: 11px;
            vertical-align: middle;
        }
        .help-icon:hover { background: var(--btn-hover); }
        .help-popup {
            position: absolute;
            background: var(--tooltip-bg);
            color: var(--tooltip-text);
            border: 1px solid var(--tooltip-border);
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 11px;
            max-width: 320px;
            z-index: 1000;
        }
        .help-popup table { border-collapse: collapse; }
        .help-popup td { padding: 2px 6px; vertical-align: top; }
        .help-popup td.k { color: var(--tooltip-name); font-family: 'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace; }

        /* HTML node overlay */
        #node-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 10;
        }
        .card-node {
            position: absolute;
            display: flex;
            flex-direction: column;
            will-change: transform;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 0 8px 8px 0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.06);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            cursor: pointer;
            pointer-events: auto;
            box-sizing: border-box;
            overflow: hidden;
            transform-origin: top left;
            user-select: none;
        }
        .card-main-row {
            display: flex;
            align-items: center;
            padding: 8px 12px 8px 4px;
            flex: 0 0 auto;
            position: relative;
            min-width: 0;
        }
        .card-node .card-bar {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            background: var(--card-bar-color, #888);
        }
        .card-node .card-icon {
            flex: 0 0 auto;
            width: 28px;
            height: 28px;
            margin-left: 14px;
            margin-right: 10px;
            border-radius: 5px;
            background: var(--card-icon-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--card-icon-fg);
        }
        .card-node .card-icon svg { width: 16px; height: 16px; display: block; }
        .card-node .card-text {
            flex: 1 1 auto;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .card-node .card-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--card-name);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-node .card-schema {
            font-size: 11px;
            font-family: 'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace;
            color: var(--card-schema);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-node.selected {
            background: var(--card-selected-bg);
            border-color: var(--card-selected-border);
            box-shadow: 0 0 0 1px var(--card-selected-border) inset;
        }
        .card-node.dimmed { opacity: 0.3; }
        .card-node.stub {
            background: var(--stub-bg);
            border: 1px dashed var(--stub-border);
            border-radius: 8px;
            color: var(--stub-text);
            padding: 8px 14px;
            justify-content: center;
            font-size: 12px;
            font-weight: 500;
        }
        .card-node.stub .card-icon { display: none; }
        .card-node.stub .card-bar { display: none; }
        .card-node.stub .card-name { color: var(--stub-text); font-weight: 500; }
        .card-node.running .card-bar {
            animation: card-running-pulse 1.2s ease-in-out infinite;
        }
        @keyframes card-running-pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 var(--card-bar-color, #5AC8FA); }
            50%      { opacity: 0.45; box-shadow: 0 0 6px 1px var(--card-bar-color, #5AC8FA); }
        }

        /* Docs sidebar */
        #docs-sidebar {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            width: 30vw;
            min-width: 280px;
            max-width: 80vw;
            background: var(--card-bg);
            border-left: 1px solid var(--card-border);
            display: none;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            font-size: 13px;
            color: var(--card-name);
            z-index: 50;
            overflow: hidden;
        }
        #docs-sidebar.open { display: flex; }
        #docs-sidebar .resize-handle {
            position: absolute;
            left: -3px; top: 0; bottom: 0;
            width: 6px;
            cursor: ew-resize;
            z-index: 60;
            background: transparent;
        }
        #docs-sidebar .resize-handle:hover { background: var(--card-selected-border); opacity: 0.4; }
        .docs-header {
            padding: 48px 16px 10px;
            border-bottom: 1px solid var(--card-border);
            position: relative;
        }
        .docs-header .docs-title-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding-right: 24px;
        }
        .docs-header .docs-icon {
            flex: 0 0 auto;
            width: 26px; height: 26px;
            background: var(--card-icon-bg);
            color: var(--card-icon-fg);
            border-radius: 5px;
            display: flex; align-items: center; justify-content: center;
        }
        .docs-header .docs-icon svg { width: 16px; height: 16px; }
        .docs-header .docs-title { flex: 1 1 auto; min-width: 0; }
        .docs-header .docs-name { font-size: 14px; font-weight: 700; color: var(--card-name); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .docs-header .docs-schema { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; font-size: 11px; color: var(--card-schema); margin-top: 2px; }
        .docs-close {
            position: absolute;
            top: 12px; left: 12px;
            width: 22px; height: 22px;
            border: none;
            background: transparent;
            color: var(--card-schema);
            cursor: pointer;
            font-size: 18px;
            line-height: 18px;
            border-radius: 4px;
        }
        .docs-close:hover { background: var(--card-icon-bg); color: var(--card-name); }
        .docs-description {
            padding: 12px 16px;
            font-size: 13px;
            line-height: 1.5;
            color: var(--card-name);
            border-bottom: 1px solid var(--card-border);
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        .docs-description.empty { display: none; }
        .docs-description .desc-text {
            flex: 1 1 auto;
            min-width: 0;
            white-space: pre-wrap;
        }
        .docs-description .desc-text.collapsed {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .docs-description .desc-toggle {
            flex: 0 0 auto;
            background: transparent;
            border: none;
            color: var(--card-schema);
            cursor: pointer;
            padding: 2px;
            border-radius: 3px;
            margin-top: 1px;
            display: none;
        }
        .docs-description.has-overflow .desc-toggle { display: flex; align-items: center; }
        .docs-description .desc-toggle svg { width: 12px; height: 12px; transition: transform 0.15s; }
        .docs-description.expanded .desc-toggle svg { transform: rotate(180deg); }
        .docs-description .desc-toggle:hover { background: var(--card-icon-bg); color: var(--card-name); }
        .docs-pills {
            display: flex; flex-wrap: wrap; gap: 6px;
            padding: 10px 16px 12px;
            border-bottom: 1px solid var(--card-border);
        }
        .docs-pill.tag { background: var(--card-selected-bg); border-color: var(--card-selected-border); color: var(--card-selected-border); }
        .docs-pill {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace;
            background: var(--card-icon-bg);
            color: var(--card-name);
            border: 1px solid var(--card-border);
        }
        .docs-pill.tests-ok { color: #2e7d32; border-color: rgba(76, 175, 80, 0.35); }
        body.theme-light .docs-pill.tests-ok { background: #e8f5e9; }
        .docs-tabs {
            display: flex;
            border-bottom: 1px solid var(--card-border);
            padding: 0 12px;
            gap: 4px;
        }
        .docs-tab {
            padding: 10px 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--card-schema);
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            margin-bottom: -1px;
            font-family: inherit;
        }
        .docs-tab.active { color: var(--card-name); border-bottom-color: var(--card-selected-border); font-weight: 600; }
        .docs-content {
            flex: 1 1 auto;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 0;
            min-height: 0;
            overscroll-behavior: contain;
            contain: strict;
            transform: translateZ(0);
        }
        .docs-content .docs-section { contain: content; }
        .docs-content .col-row { contain: layout style; }
        .docs-content .docs-section { display: none; padding: 8px 0; }
        .docs-content .docs-section.active { display: block; }
        .docs-content .col-header {
            display: flex;
            justify-content: space-between;
            padding: 8px 16px;
            font-size: 11px;
            font-weight: 600;
            color: var(--card-schema);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--card-border);
        }
        .docs-content .col-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 16px;
            border-bottom: 1px solid var(--card-border);
        }
        .docs-content .col-row.selected { background: var(--card-selected-bg); }
        .docs-content .col-main { flex: 1 1 auto; min-width: 0; }
        .docs-content .col-name {
            font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace;
            font-size: 13px;
            font-weight: 600;
            color: var(--card-name);
            display: flex; align-items: center; gap: 6px;
        }
        .docs-content .col-pk-badge {
            background: #ffe6c2;
            color: #b85c00;
            font-size: 10px;
            font-weight: 700;
            padding: 1px 6px;
            border-radius: 3px;
            font-family: -apple-system, sans-serif;
        }
        body:not(.theme-light) .docs-content .col-pk-badge { background: rgba(255, 152, 0, 0.25); color: #ffb74d; }
        .docs-content .col-fk { font-size: 11px; color: var(--card-schema); margin-top: 2px; font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; }
        .docs-content .col-desc { font-size: 12px; color: var(--card-schema); margin-top: 2px; }
        .docs-content .col-type {
            font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace;
            font-size: 11px;
            color: var(--card-schema);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
            padding-top: 2px;
        }
        .docs-content .docs-list { list-style: none; padding: 0; margin: 0; }
        .docs-content .docs-list li { padding: 8px 16px; border-bottom: 1px solid var(--card-border); font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; font-size: 12px; }
        .docs-content pre.code-block {
            margin: 0;
            padding: 12px 16px;
            font-family: 'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace;
            font-size: 12px;
            white-space: pre;
            overflow-x: auto;
            background: var(--card-icon-bg);
            color: var(--card-name);
        }
        .docs-content .meta-table { width: 100%; border-collapse: collapse; }
        .docs-content .meta-table td { padding: 6px 16px; border-bottom: 1px solid var(--card-border); font-size: 12px; vertical-align: top; }
        .docs-content .meta-table td.k { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; color: var(--card-schema); width: 40%; }
        .docs-content .meta-table td.v { color: var(--card-name); word-break: break-all; }
        .docs-content .empty { padding: 16px; color: var(--card-schema); font-style: italic; font-size: 12px; }

        #toggle-sidebar.active { background: var(--card-selected-bg); border-color: var(--card-selected-border); }
        #regenerate-docs.needs-attention {
            background: var(--card-selected-bg);
            border-color: var(--card-selected-border);
            color: var(--card-selected-border);
            animation: pulse 1.6s ease-in-out infinite;
        }
        #regenerate-docs.running { opacity: 0.6; cursor: wait; }
        #regenerate-docs.running svg { animation: spin 1s linear infinite; }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 var(--card-selected-border); }
            50%      { box-shadow: 0 0 0 4px transparent; }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .card-failure-badge {
            position: absolute;
            top: 4px;
            right: 6px;
            min-width: 14px;
            height: 14px;
            padding: 0 4px;
            border-radius: 7px;
            background: #F85149;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            line-height: 14px;
            text-align: center;
            pointer-events: none;
        }
        .card-node.no-failure-badge .card-failure-badge { display: none; }
        .run-results-hint {
            position: absolute;
            top: 44px;
            left: 8px;
            z-index: 100;
            padding: 4px 8px;
            background: rgba(255, 200, 0, 0.08);
            color: var(--text-color);
            border-left: 2px solid #E3B341;
            font-size: 11px;
            pointer-events: none;
        }
        .card-toggle {
            position: absolute;
            bottom: 4px;
            right: 6px;
            width: 14px;
            height: 14px;
            font-size: 11px;
            line-height: 14px;
            text-align: center;
            color: var(--card-schema);
            cursor: pointer;
            user-select: none;
        }
        .card-toggle:hover { color: var(--text-color); }
        .card-columns {
            margin-top: 4px;
            max-height: 240px;
            overflow-y: auto;
            border-top: 1px solid rgba(255,255,255,0.06);
            padding: 4px 6px 4px 38px;
            font-size: 11px;
        }
        .card-columns .col-row {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            line-height: 18px;
        }
        .card-columns .col-type {
            font-family: 'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace;
            color: var(--card-schema);
        }
        .card-columns .pk-badge {
            display: inline-block;
            margin-right: 4px;
            padding: 0 4px;
            border-radius: 4px;
            background: rgba(78,121,167,0.4);
            color: #fff;
            font-size: 9px;
            font-weight: 700;
        }
        .card-banner {
            margin-top: 4px;
            padding: 4px 6px 4px 38px;
            color: var(--card-schema);
            font-size: 10px;
            font-style: italic;
        }

        #minimap-wrap {
            position: absolute;
            right: 8px;
            bottom: 8px;
            width: 160px;
            height: 240px;
            background: var(--tooltip-bg);
            border: 1px solid var(--tooltip-border);
            border-radius: 4px;
            z-index: 50;
            cursor: crosshair;
        }
        #minimap-wrap.cy-minimap-pan { cursor: grabbing; }
        #minimap { display: block; width: 100%; height: 100%; }
        #controls button.active { background: var(--card-selected-bg); border-color: var(--card-selected-border); }
        .toolbar-label { font-size: 11px; margin-left: 6px; color: var(--text-color); }
        .toolbar-select {
            background: var(--btn-bg);
            color: var(--btn-text);
            border: 1px solid var(--btn-border);
            padding: 2px 6px;
            font-size: 11px;
            border-radius: 4px;
            height: 28px;
            cursor: pointer;
        }
        .toolbar-select:hover { background: var(--btn-hover); }
        .card-freshness {
            display: inline-block;
            margin-left: 6px;
            font-size: 10px;
            line-height: 10px;
            cursor: pointer;
            vertical-align: middle;
        }
        .card-freshness.fresh-warn  { color: #E3B341; }
        .card-freshness.fresh-error { color: #F85149; }
    </style>
</head>
<body>
    <div id="cy"></div>
    <div id="node-overlay"></div>
    <div id="loading" style="color: var(--loading-color)">Waiting for data...</div>
    <div id="tooltip" class="tooltip"></div>
    <div id="search-box">
        <input id="search-input" type="text" placeholder="Search nodes..." />
        <button id="search-clear" title="Clear">&times;</button>
        <button id="search-help" class="help-icon" title="Search syntax">?</button>
    </div>
    <div id="run-results-hint" class="run-results-hint" style="display: none"></div>
    <div id="controls">
        <label class="toolbar-label">Group:</label>
        <select id="cluster-mode" class="toolbar-select">
            <option value="none">None</option>
            <option value="schema">Schema</option>
            <option value="folder">Folder</option>
            <option value="tag">Tag</option>
        </select>
        <button id="regenerate-docs" title="Regenerate dbt docs">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="width:14px;height:14px;">
                <path d="M2.5 8a5.5 5.5 0 0 1 9.6-3.7"/>
                <path d="M12.5 2v3h-3"/>
                <path d="M13.5 8a5.5 5.5 0 0 1-9.6 3.7"/>
                <path d="M3.5 14v-3h3"/>
            </svg>
        </button>
        <button id="zoom-in" title="Zoom in">+</button>
        <button id="zoom-out" title="Zoom out">−</button>
        <button id="zoom-fit" title="Fit graph">⊡</button>
        <button id="minimap-toggle" title="Toggle mini-map">▣</button>
        <button id="toggle-sidebar" title="Show docs sidebar">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="width:14px;height:14px;">
                <rect x="2" y="3" width="12" height="10" rx="1"/>
                <line x1="10" y1="3" x2="10" y2="13"/>
                <line x1="11.5" y1="6" x2="13" y2="6"/>
